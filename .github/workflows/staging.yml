name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      - name: Link & Deploy Staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
        run: |
          supabase link --project-ref $PROJECT_ID --password $DB_PASSWORD
          supabase secrets set SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          supabase db push
          supabase functions deploy rate-limit

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: denoland/setup-deno@11b63cf76cfcafb4e43f97b6cad24d8e8438f62d # v1.5.2
        with:
          deno-version: "2.7.7"

      # Read-only check that the dashboard-managed CORS_ALLOWED_ORIGINS secret
      # actually allows the staging origin. Catches an apex-vs-www style
      # mismatch here, before the change is promoted to production.
      - name: Verify CORS preflight
        env:
          RATE_LIMIT_FUNCTION_URL: https://${{ secrets.SUPABASE_STAGING_PROJECT_ID }}.supabase.co/functions/v1/rate-limit
          EXPECTED_CORS_ORIGINS: https://staging.intrack.pt
        run: npm run test:cors-smoke
